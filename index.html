<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben Senin Delinim — Hande Yener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Sacramento&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #06070f;
      --violet: #7c6cdc;
      --lavend: #b5a8f5;
      --gold:   #c8a96e;
      --cream:  #ede8df;
      --muted:  rgba(237,232,223,0.30);
      --glow-v: rgba(124,108,220,0.28);
      --glow-g: rgba(200,169,110,0.22);
    }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    #ambientCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.55;
    }

    .wrapper {
      position: relative; z-index: 2;
      max-width: 820px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 5rem;
      display: flex; flex-direction: column; align-items: center;
    }

    /* HEADER */
    .header {
      text-align: center; margin-bottom: 2rem;
      opacity: 0; animation: fadeUp .9s ease .2s forwards;
    }
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: .6rem; letter-spacing: .42em;
      color: var(--gold); text-transform: uppercase; margin-bottom: .7rem;
    }
    .artist-name {
      font-family: 'Sacramento', cursive;
      font-size: clamp(2.8rem, 8vw, 5rem);
      color: var(--lavend);
      text-shadow: 0 0 60px var(--glow-v), 0 0 120px var(--glow-v);
      line-height: 1; margin-bottom: .4rem;
    }
    .song-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(.9rem, 2.6vw, 1.35rem);
      font-weight: 600; letter-spacing: .16em;
      color: var(--cream);
    }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      width: 100%; max-width: 440px; margin-bottom: 2rem;
      opacity: 0; animation: fadeUp .9s ease .5s forwards;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .divider span { color: var(--gold); font-size: 1rem; }

    /* VIDEO */
    .video-wrap {
      width: 100%; max-width: 720px;
      border-radius: 4px; overflow: hidden; position: relative;
      box-shadow: 0 0 70px rgba(124,108,220,0.18), 0 0 0 1px rgba(124,108,220,0.12);
      opacity: 0; animation: fadeUp 1s ease .7s forwards;
      background: #000;
    }
    .video-wrap video {
      width: 100%; display: block;
      border-radius: 4px;
    }

    /* custom video controls */
    .controls {
      display: flex; align-items: center; gap: .9rem;
      padding: .75rem 1.1rem;
      background: rgba(6,7,15,0.85);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(124,108,220,0.1);
    }

    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--lavend); font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover { color: var(--cream); background: rgba(124,108,220,0.15); }
    .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .seek-wrap {
      flex: 1; position: relative; height: 3px;
      background: rgba(124,108,220,0.15);
      border-radius: 3px; cursor: pointer;
    }
    .seek-fill {
      height: 100%; width: 0%; border-radius: 3px;
      background: linear-gradient(90deg, var(--violet), var(--gold));
      box-shadow: 0 0 8px var(--glow-v);
      pointer-events: none;
      transition: width .1s linear;
    }
    .seek-wrap:hover .seek-fill { height: 5px; margin-top: -1px; }

    .time-label {
      font-family: 'Cinzel', serif;
      font-size: .58rem; letter-spacing: .06em;
      color: var(--gold); white-space: nowrap; flex-shrink: 0;
    }

    /* LYRICS PANEL */
    .lyrics-panel {
      width: 100%; max-width: 720px;
      margin-top: 2rem;
      padding: 2rem 1.8rem 1.8rem;
      border: 1px solid rgba(124,108,220,0.13);
      border-radius: 4px;
      background: rgba(255,255,255,0.022);
      backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
      opacity: 0; animation: fadeUp 1s ease 1.1s forwards;
    }
    .lyrics-panel::before, .lyrics-panel::after {
      content: ''; position: absolute; left: 0; right: 0; height: 56px; z-index: 2; pointer-events: none;
    }
    .lyrics-panel::before { top: 52px; background: linear-gradient(to bottom, rgba(6,7,15,.92), transparent); }
    .lyrics-panel::after  { bottom: 0; background: linear-gradient(to top, rgba(6,7,15,.92), transparent); }

    .lyrics-label {
      font-family: 'Cinzel', serif;
      font-size: .56rem; letter-spacing: .4em;
      color: var(--gold); text-transform: uppercase;
      text-align: center; margin-bottom: 1.4rem;
      position: relative; z-index: 3;
    }

    .lyrics-scroll { height: 270px; overflow: hidden; position: relative; }

    .lyrics-inner {
      display: flex; flex-direction: column; align-items: center; gap: 0;
      transition: transform .65s cubic-bezier(.4,0,.2,1);
      padding: 120px 0;
    }

    .lyric-line {
      width: 100%; text-align: center;
      padding: .5rem 1rem;
      font-size: clamp(.92rem, 2.2vw, 1.12rem);
      font-weight: 300; color: var(--muted);
      line-height: 1.6; border-radius: 2px;
      opacity: .35; transform: scale(.92);
      transition: color .5s, text-shadow .5s, transform .5s, opacity .5s, font-size .5s;
    }
    .lyric-line.active {
      color: var(--cream); font-weight: 400;
      font-size: clamp(1.08rem, 2.7vw, 1.32rem);
      text-shadow: 0 0 32px var(--glow-v);
      transform: scale(1); opacity: 1;
    }
    .lyric-line.chorus.active {
      color: var(--lavend);
      text-shadow: 0 0 50px var(--glow-v), 0 0 90px var(--glow-v);
    }
    .lyric-line.key.active {
      color: var(--gold);
      text-shadow: 0 0 40px var(--glow-g), 0 0 80px var(--glow-g);
      font-size: clamp(1.2rem, 3.1vw, 1.55rem);
      letter-spacing: .04em;
    }

    .footer {
      margin-top: 3rem;
      font-family: 'Cinzel', serif;
      font-size: .54rem; letter-spacing: .3em;
      color: rgba(237,232,223,.15); text-align: center;
      opacity: 0; animation: fadeUp .9s ease 1.5s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .lyrics-panel { padding: 1.8rem 1rem 1.5rem; }
    }
  </style>
</head>
<body>

<canvas id="ambientCanvas"></canvas>
<div class="grain"></div>

<div class="wrapper">
  <header class="header">
    <p class="eyebrow">Hande Yener &nbsp;·&nbsp; 2024</p>
    <h2 class="artist-name">Hande Yener</h2>
    <h1 class="song-title">Ben Senin Delinim</h1>
  </header>

  <div class="divider"><span>✦</span></div>

  <div class="video-wrap">
    <video id="vid" preload="metadata">
      <source src="delisin-delisin.mp4" type="video/mp4" />
    </video>
    <div class="controls">
      <!-- play/pause -->
      <button class="ctrl-btn" id="btnPlay" title="Oynat / Durdur">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <!-- seek bar -->
      <div class="seek-wrap" id="seekWrap">
        <div class="seek-fill" id="seekFill"></div>
      </div>
      <!-- time -->
      <span class="time-label" id="timeLabel">0:00 / 0:00</span>
      <!-- mute -->
      <button class="ctrl-btn" id="btnMute" title="Ses">
        <svg id="iconVol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </button>
    </div>
  </div>

  <div class="lyrics-panel">
    <p class="lyrics-label">Şarkı Sözleri</p>
    <div class="lyrics-scroll">
      <div class="lyrics-inner" id="lyricsInner"></div>
    </div>
  </div>

  <p class="footer">made with love &nbsp;✦&nbsp; forever &amp; always</p>
</div>

<script>

const LYRICS = [
  { t:  14, text: "Hâlâ sen varsın yerinde",                    type: "verse"  },
  { t:  21, text: "Bıraktığın izler derinde",                   type: "verse"  },
  { t:  28, text: "Aşkın gölgen mi peşimde",                    type: "verse"  },
  { t:  35, text: "Gelirim istesen bir sözünle",                type: "verse"  },
  { t:  43, text: "Küçücük bi' çaban olmadı, bekledim",         type: "verse"  },
  { t:  51, text: "Ben kayıptım, sendin rehberim",              type: "verse"  },
  { t:  58, text: "Yağmurlar yağdı, sönmedim",                  type: "verse"  },
  { t:  65, text: "Ben böyle yanmak görmedim",                  type: "verse"  },
  { t:  72, text: "Uzadı, uzadı bu konu, bende kapanmadı",     type: "chorus" },
  { t:  81, text: "Neler yaşandı? İçim seni hiç bırakmadı",   type: "chorus" },
  { t:  90, text: "Bendeydin, hiç gitmedin",                    type: "chorus" },
  { t:  96, text: "Ben bittim, sen bitmedin",                   type: "chorus" },
  { t: 102, text: "İstemiyorum duymayı, dayanamayıp sormayı",  type: "chorus" },
  { t: 111, text: "Yerine koyamam, iyi de olamam",              type: "chorus" },
  { t: 119, text: "Korkarım, sevgilim, kendimde değilim",       type: "chorus" },
  { t: 127, text: "Sürse bu ayrılık ben ölene kadar",          type: "chorus" },
  { t: 134, text: "Ben senin delinim",                          type: "key"    },
  { t: 140, text: "Kimsenin olamam",                            type: "key"    },
  { t: 150, text: "Uzadı, uzadı bu konu, bende kapanmadı",     type: "chorus" },
  { t: 159, text: "Neler yaşandı? İçim seni hiç bırakmadı",   type: "chorus" },
  { t: 167, text: "Bendeydin, hiç gitmedin",                    type: "chorus" },
  { t: 173, text: "Ben bittim, sen bitmedin",                   type: "chorus" },
  { t: 179, text: "İstemiyorum duymayı, dayanamayıp sormayı",  type: "chorus" },
  { t: 188, text: "Yerine koyamam, iyi de olamam",              type: "chorus" },
  { t: 196, text: "Korkarım, sevgilim, kendimde değilim",       type: "chorus" },
  { t: 204, text: "Sürse bu ayrılık ben ölene kadar",          type: "chorus" },
  { t: 211, text: "Ben senin delinim",                          type: "key"    },
  { t: 217, text: "Kimsenin olamam",                            type: "key"    },
  { t: 224, text: "Yerine koyamam, iyi de olamam",              type: "chorus" },
  { t: 232, text: "Korkarım, sevgilim, kendimde değilim",       type: "chorus" },
  { t: 239, text: "Sürse bu ayrılık ben ölene kadar",          type: "chorus" },
  { t: 246, text: "Ben senin delinim",                          type: "key"    },
  { t: 252, text: "Kimsenin olamam…",                           type: "key"    },
];

const lyricsInner = document.getElementById('lyricsInner');
LYRICS.forEach(line => {
  const el = document.createElement('div');
  el.className = 'lyric-line ' + line.type;
  el.textContent = line.text;
  lyricsInner.appendChild(el);
});
const lineEls = lyricsInner.querySelectorAll('.lyric-line');

let activeIdx = -1;

function updateLyrics(ct) {
  let idx = -1;
  for (let i = LYRICS.length - 1; i >= 0; i--) {
    if (ct >= LYRICS[i].t) { idx = i; break; }
  }
  if (idx === activeIdx) return;
  lineEls.forEach((el, i) => el.classList.toggle('active', i === idx));
  if (idx >= 0) {
    const scroll = lyricsInner.parentElement;
    const el = lineEls[idx];
    const offset = el.offsetTop - scroll.offsetHeight / 2 + el.offsetHeight / 2;
    lyricsInner.style.transform = `translateY(${-offset}px)`;
  }
  activeIdx = idx;
}

const vid       = document.getElementById('vid');
const btnPlay   = document.getElementById('btnPlay');
const seekWrap  = document.getElementById('seekWrap');
const seekFill  = document.getElementById('seekFill');
const timeLabel = document.getElementById('timeLabel');
const btnMute   = document.getElementById('btnMute');

const PLAY_ICON = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const PAUSE_ICON= `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
const VOL_ICON  = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
const MUTE_ICON = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`;

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

btnPlay.addEventListener('click', () => {
  vid.paused ? vid.play() : vid.pause();
});
vid.addEventListener('play',  () => { btnPlay.innerHTML = PAUSE_ICON; });
vid.addEventListener('pause', () => { btnPlay.innerHTML = PLAY_ICON; });

btnMute.addEventListener('click', () => {
  vid.muted = !vid.muted;
  btnMute.innerHTML = vid.muted ? MUTE_ICON : VOL_ICON;
});

vid.addEventListener('timeupdate', () => {
  const ct = vid.currentTime;
  const dur = vid.duration || 0;
  seekFill.style.width = dur ? (ct / dur * 100) + '%' : '0%';
  timeLabel.textContent = `${fmt(ct)} / ${fmt(dur)}`;
  updateLyrics(ct);
});

seekWrap.addEventListener('click', e => {
  const rect = seekWrap.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  vid.currentTime = ratio * (vid.duration || 0);
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
  if (e.code === 'ArrowRight') vid.currentTime = Math.min(vid.currentTime + 5, vid.duration);
  if (e.code === 'ArrowLeft')  vid.currentTime = Math.max(vid.currentTime - 5, 0);
  if (e.code === 'KeyM') btnMute.click();
});

(function () {
  const c = document.getElementById('ambientCanvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  addEventListener('resize', resize); resize();
  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#06070f'; ctx.fillRect(0,0,W,H);
    const cx = W*.5, cy = H*.45;
    const orbs = [
      { x: cx+Math.sin(t*.22)*W*.2,  y: cy+Math.cos(t*.17)*H*.2,  r:W*.7,  c:'rgba(72,55,170,.14)' },
      { x: cx+Math.cos(t*.18)*W*.25, y: cy+Math.sin(t*.28)*H*.25, r:W*.5,  c:'rgba(44,28,110,.11)' },
      { x: cx+Math.sin(t*.13)*W*.12, y: cy-Math.sin(t*.21)*H*.15, r:W*.35, c:'rgba(150,120,55,.06)' },
    ];
    for (const o of orbs) {
      const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,o.c); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    }
    t+=.007; requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
